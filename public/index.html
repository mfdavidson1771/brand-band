-bottom: 1px solid #F0EDE6;\n}\n.totals-table tr:last-child td { border-bottom: none; }\n.totals-table td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }\n.totals-brand-cell { display: flex; align-items: center; gap: 10px; }\n.totals-brand-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }\n.totals-brand-name { font-weight: 700; }\n.totals-zero { color: #bbb; }\n\n/* Session history */\n.session-history { background: #fff; border-radius: 16px; overflow: hidden; }\n.history-entry {\n  display: grid;\n  grid-template-columns: 90px 1fr auto;\n  gap: 8px 16px;\n  padding: 12px 16px;\n  border-bottom: 1px solid #F0EDE6;\n  align-items: start;\n}\n.history-entry:last-child { border-bottom: none; }\n.history-date { font-size: 13px; color: #999; font-weight: 600; padding-top: 2px; }\n.history-detail {}\n.history-card-title { font-size: 15px; font-weight: 700; color: #111; }\n.history-brand { font-size: 13px; color: #777; margin-top: 2px; }\n.history-manual-tag {\n  font-size: 11px; font-weight: 700; color: #888;\n  background: #F0EDE6; border-radius: 4px; padding: 1px 6px;\n  display: inline-block; margin-left: 6px; vertical-align: middle;\n}\n.history-mins { font-size: 15px; font-weight: 700; color: #333; white-space: nowrap; padding-top: 2px; }\n.history-delete {\n  background: none; border: none; color: #ddd;\n  cursor: pointer; font-size: 14px; padding: 2px 4px;\n  transition: color 0.15s;\n}\n.history-delete:hover { color: #C04B20; }\n\n.no-sessions { padding: 32px; text-align: center; font-size: 15px; color: #aaa; }\n\n/* ============================================================\n   DORMANT BRANDS\n   ============================================================ */\n.dormant-toggle-row { margin-bottom: 12px; }\n.dormant-toggle-btn {\n  background: none; border: 2px solid #ddd;\n  border-radius: 10px; padding: 6px 14px;\n  font-size: 12px; font-weight: 700; color: #999;\n  cursor: pointer; transition: all 0.15s;\n  letter-spacing: 0.04em;\n}\n.dormant-toggle-btn:hover { border-color: #aaa; color: #555; }\n.dormant-brands-row {\n  display: none; gap: 6px; margin-bottom: 12px; flex-wrap: wrap;\n}\n.dormant-brands-row.open { display: flex; }\n\n/* ============================================================\n   CARDS TABS (Cards / Backend)\n   ============================================================ */\n.cards-tabs {\n  display: flex; gap: 6px; margin-bottom: 14px;\n}\n.cards-tab {\n  padding: 7px 18px; border-radius: 8px;\n  font-size: 13px; font-weight: 700;\n  border: 2px solid #ddd; background: #fff;\n  cursor: pointer; color: #777;\n  transition: all 0.15s, transform 0.12s;\n}\n.cards-tab.active { background: #111; border-color: #111; color: #fff; }\n.cards-tab:hover:not(.active) { border-color: #aaa; color: #333; transform: translateY(-1px); }\n\n/* ============================================================\n   BACKEND PANEL\n   ============================================================ */\n.backend-panel { display: none; }\n.backend-panel.open { display: block; }\n\n.backend-section { margin-bottom: 20px; }\n.backend-section-title {\n  font-size: 11px; font-weight: 800; text-transform: uppercase;\n  letter-spacing: 0.1em; color: #888; margin-bottom: 10px;\n}\n.backend-field {\n  background: #fff; border-radius: 12px;\n  padding: 14px 16px; margin-bottom: 8px;\n}\n.backend-field-label {\n  font-size: 11px; font-weight: 700; color: #aaa;\n  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;\n}\n.backend-field-value {\n  font-size: 14px; color: #111; font-weight: 500; line-height: 1.5;\n}\n.backend-field-value a { color: #185FA5; text-decoration: none; }\n.backend-field-value a:hover { text-decoration: underline; }\n\n.backend-tool-row {\n  display: flex; gap: 10px; align-items: baseline;\n  padding: 10px 0; border-bottom: 1px solid #F0EDE6;\n}\n.backend-tool-row:last-child { border-bottom: none; }\n.backend-tool-name { font-size: 13px; font-weight: 700; color: #111; min-width: 120px; flex-shrink: 0; }\n.backend-tool-detail { font-size: 13px; color: #555; line-height: 1.5; }\n\n.backend-tools-block {\n  background: #fff; border-radius: 12px; padding: 4px 16px; margin-bottom: 8px;\n}\n.backend-empty { color: #bbb; font-size: 13px; padding: 8px 0; }\n\n.backend-add-btn {\n  background: none; border: 2px dashed #ccc;\n  border-radius: 10px; padding: 10px 16px;\n  font-size: 13px; font-weight: 700; color: #aaa;\n  cursor: pointer; width: 100%; transition: all 0.15s;\n}\n.backend-add-btn:hover { border-color: #888; color: #555; }\n\n.backend-notes-input {\n  width: 100%; background: #fff; border: 2px solid transparent;\n  border-radius: 12px; padding: 14px 16px;\n  font-size: 14px; color: #111; font-family: inherit;\n  resize: vertical; min-height: 80px; line-height: 1.6;\n  outline: none; transition: border-color 0.15s;\n}\n.backend-notes-input:focus { border-color: #888; }\n.backend-notes-input::placeholder { color: #ccc; }\n\n/* ============================================================\n   PASSWORD GATE\n   ============================================================ */\n.gate-overlay {\n  position: fixed; inset: 0;\n  background: #EDEBE4;\n  z-index: 99999;\n  display: flex; align-items: center; justify-content: center;\n  padding: 24px;\n}\n.gate-box {\n  background: #fff;\n  border-radius: 20px;\n  padding: 36px 32px 28px;\n  width: 100%; max-width: 360px;\n  box-shadow: 0 20px 60px rgba(0,0,0,0.12);\n  text-align: center;\n}\n.gate-title { font-size: 22px; font-weight: 900; color: #111; margin-bottom: 6px; letter-spacing: -0.02em; }\n.gate-sub { font-size: 13px; color: #888; margin-bottom: 24px; }\n.gate-input {\n  width: 100%; font-size: 16px; color: #111;\n  background: #F5F4F1; border: 2px solid transparent;\n  border-radius: 10px; padding: 12px 14px;\n  font-family: inherit; outline: none;\n  transition: border-color 0.15s; margin-bottom: 12px;\n  text-align: center; letter-spacing: 0.04em;\n}\n.gate-input:focus { border-color: #888; background: #fff; }\n.gate-input.error { border-color: #C04B20; animation: gateShake 0.35s ease; }\n.gate-btn {\n  width: 100%; background: #111; color: #fff;\n  border: none; border-radius: 12px;\n  padding: 14px; font-size: 16px; font-weight: 800;\n  cursor: pointer; transition: opacity 0.15s, transform 0.12s;\n}\n.gate-btn:hover { opacity: 0.8; transform: scale(1.02); }\n.gate-error { font-size: 13px; color: #C04B20; margin-top: 10px; min-height: 18px; }\n@keyframes gateShake {\n  0%, 100% { transform: translateX(0); }\n  25%       { transform: translateX(-8px); }\n  75%       { transform: translateX(8px); }\n}\n\n/* ============================================================\n   CONFETTI\n   ============================================================ */\n.confetti-piece {\n  position: fixed;\n  pointer-events: none;\n  z-index: 9999;\n  border-radius: 2px;\n  will-change: transform, opacity;\n}\n@keyframes confettiBurst {\n  0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }\n  75%  { opacity: 0.9; }\n  100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; }\n}\n\n/* All-done bounce */\n@keyframes allDoneBounce {\n  0%   { transform: scale(1); }\n  20%  { transform: scale(1.016); }\n  45%  { transform: scale(0.996); }\n  65%  { transform: scale(1.008); }\n  100% { transform: scale(1); }\n}\n</style>\n</head>\n<body>\n\n<!-- Password gate -->\n<div class=\"gate-overlay\" id=\"gate-overlay\">\n  <div class=\"gate-box\">\n    <div class=\"gate-title\">Brand Band</div>\n    <div class=\"gate-sub\">Enter password to continue</div>\n    <input class=\"gate-input\" id=\"gate-input\" type=\"password\" placeholder=\"\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\"\n      onkeydown=\"if(event.key==='Enter') gateSubmit()\">\n    <button class=\"gate-btn\" onclick=\"gateSubmit()\">Enter</button>\n    <div class=\"gate-error\" id=\"gate-error\"></div>\n  </div>\n</div>\n\n<div class=\"title-row\"><h1>Brand Band</h1><span class=\"tagline\">Eight brands. One brain. Let's go.</span></div>\n<div class=\"how-to-use\">Pick a brand. Pick a card. Hit <strong>Start</strong>. Everything else is noise.</div>\n\n<!-- Daily brands panel -->\n<div class=\"daily-panel\" id=\"daily-panel\">\n  <div class=\"daily-header\">\n    <div class=\"daily-title\" id=\"daily-title\">Daily brands</div>\n    <div class=\"daily-subtitle\" id=\"daily-subtitle\">15 min minimum each, every weekday</div>\n  </div>\n  <div class=\"daily-cards-row\" id=\"daily-cards-row\"></div>\n</div>\n\n<!-- Brand health strip -->\n<div class=\"health-strip\">\n  <div class=\"health-strip-title\">Last time you worked on each brand</div>\n  <div class=\"health-rows\" id=\"health-rows\"></div>\n</div>\n\n<div class=\"load-bar-wrap\"><div class=\"load-bar-fill\" id=\"load-bar\"></div></div>\n\n<!-- Timer banner -->\n<div class=\"timer-banner\" id=\"timer-banner\">\n  <div class=\"timer-left\">\n    <div class=\"timer-eyebrow\"><span class=\"timer-live-dot\"></span>Now working on</div>\n    <div class=\"timer-card-name\" id=\"timer-card-name\">\u2014</div>\n    <div class=\"timer-brand-name\" id=\"timer-brand-name\">\u2014</div>\n  </div>\n  <div class=\"timer-right\">\n    <div class=\"timer-clock\" id=\"timer-clock\">00:00:00</div>\n    <button class=\"stop-btn\" onclick=\"stopTimer()\">Stop</button>\n  </div>\n</div>\n\n<!-- Brand selector -->\n<div class=\"section-label\">Select a brand to see its cards</div>\n<div class=\"brands-row\" id=\"brands-row\"></div>\n\n<!-- Dormant brands -->\n<div class=\"dormant-toggle-row\">\n  <button class=\"dormant-toggle-btn\" id=\"dormant-toggle-btn\" onclick=\"toggleDormant()\">\ud83e\udd41 Auditions</button>\n</div>\n<div class=\"dormant-brands-row\" id=\"dormant-brands-row\"></div>\n\n<!-- Back office -->\n<div class=\"dormant-toggle-row\">\n  <button class=\"dormant-toggle-btn\" id=\"ops-toggle-btn\" onclick=\"toggleOps()\">\u2699 Back office</button>\n</div>\n<div class=\"ops-brands-row\" id=\"ops-row\"></div>\n\n<!-- Brand Funnel -->\n<div class=\"dormant-toggle-row\">\n  <button class=\"dormant-toggle-btn\" id=\"funnel-toggle-btn\" onclick=\"toggleFunnel()\">\ud83d\udcca Brand Funnel</button>\n</div>\n<div class=\"funnel-panel\" id=\"funnel-panel\"></div>\n\n<!-- Cards -->\n<div class=\"cards-area\" id=\"cards-area\">\n  <div class=\"cards-empty\"><span>\u2191</span>Pick a brand above to see its work cards</div>\n</div>\n\n<!-- Add card modal -->\n<div class=\"modal-overlay\" id=\"modal-overlay\" onclick=\"closeModal(event)\">\n  <div class=\"modal\" onclick=\"event.stopPropagation()\">\n    <div class=\"modal-title\" id=\"modal-title\">Add a card</div>\n    <div class=\"form-field\">\n      <label class=\"form-label\">Title</label>\n      <input class=\"form-input\" id=\"card-title-input\" type=\"text\" placeholder=\"What needs doing?\" maxlength=\"80\">\n    </div>\n    <div class=\"form-field\">\n      <label class=\"form-label\">Note <span style=\"font-weight:500;text-transform:none;letter-spacing:0\">(optional)</span></label>\n      <textarea class=\"form-textarea\" id=\"card-body-input\" placeholder=\"Context, why it matters, what to do first\u2026\"></textarea>\n    </div>\n    <div class=\"form-field\">\n      <label class=\"form-label\">Type</label>\n      <select class=\"form-select\" id=\"card-type-input\">\n        <option value=\"Opportunity\">Opportunity \u2014 something to act on</option>\n        <option value=\"Nudge\">Nudge \u2014 a gentle reminder</option>\n        <option value=\"Cross-pollination\">Cross-pollination \u2014 connects two brands</option>\n      </select>\n    </div>\n    <div class=\"modal-actions\">\n      <button class=\"btn-secondary\" onclick=\"closeModal()\">Cancel</button>\n      <button class=\"btn-primary\" id=\"modal-brand-btn\" onclick=\"saveCard()\">Add card</button>\n    </div>\n  </div>\n</div>\n\n<!-- Manual log modal -->\n<div class=\"modal-overlay\" id=\"manual-modal-overlay\" onclick=\"closeManualModal(event)\">\n  <div class=\"modal\" onclick=\"event.stopPropagation()\">\n    <div class=\"modal-title\">Log time manually</div>\n    <div class=\"form-field\">\n      <label class=\"form-label\">Brand</label>\n      <select class=\"form-select\" id=\"manual-brand-select\" onchange=\"populateManualCards()\">\n        <option value=\"\">\u2014 pick a brand \u2014</option>\n      </select>\n    </div>\n    <div class=\"form-field\">\n      <label class=\"form-label\">Card / task</label>\n      <select class=\"form-select\" id=\"manual-card-select\">\n        <option value=\"\">\u2014 pick a card \u2014</option>\n      </select>\n    </div>\n    <div class=\"form-field\">\n      <label class=\"form-label\">Minutes</label>\n      <input class=\"form-input\" id=\"manual-mins-input\" type=\"number\" min=\"1\" max=\"480\" placeholder=\"e.g. 45\">\n    </div>\n    <div class=\"form-field\">\n      <label class=\"form-label\">Date</label>\n      <input class=\"form-input\" id=\"manual-date-input\" type=\"date\">\n    </div>\n    <div class=\"form-field\">\n      <label class=\"form-label\">Note <span style=\"font-weight:500;text-transform:none;letter-spacing:0\">(optional)</span></label>\n      <input class=\"form-input\" id=\"manual-note-input\" type=\"text\" placeholder=\"What did you do?\">\n    </div>\n    <div class=\"modal-actions\">\n      <button class=\"btn-secondary\" onclick=\"closeManualModal()\">Cancel</button>\n      <button class=\"btn-primary\" onclick=\"saveManualEntry()\">Save</button>\n    </div>\n  </div>\n</div>\n\n<!-- Time log section -->\n<div class=\"time-log-section\" id=\"time-log-section\">\n  <div class=\"time-log-header\">\n    <div class=\"section-label\" style=\"margin-bottom:0\">Time log</div>\n    <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n      <button class=\"log-manual-btn\" onclick=\"openManualModal()\">+ Log time manually</button>\n      <button class=\"time-log-toggle\" id=\"time-log-toggle\" onclick=\"toggleTimeLog()\">Show details \u25be</button>\n    </div>\n  </div>\n  <div id=\"brand-totals-wrap\"></div>\n  <div id=\"session-history-wrap\" style=\"display:none\"></div>\n</div>\n\n\n<script>\n/* ============================================================\n   PASSWORD GATE\n   ============================================================ */\nconst GATE_KEY = 'bb_auth';\nconst GATE_PASS = 'angostura-tack-7';\n\nfunction gateCheck() {\n  if (localStorage.getItem(GATE_KEY) === '1') {\n    document.getElementById('gate-overlay').style.display = 'none';\n  } else {\n    setTimeout(() => document.getElementById('gate-input').focus(), 100);\n  }\n}\n\nfunction gateSubmit() {\n  const val = document.getElementById('gate-input').value;\n  if (val === GATE_PASS) {\n    localStorage.setItem(GATE_KEY, '1');\n    document.getElementById('gate-overlay').style.display = 'none';\n  } else {\n    const inp = document.getElementById('gate-input');\n    inp.classList.add('error');\n    document.getElementById('gate-error').textContent = 'Wrong password.';\n    inp.value = '';\n    setTimeout(() => { inp.classList.remove('error'); inp.focus(); }, 400);\n  }\n}\n\ngateCheck();\n\n/* ============================================================\n   DATA\n   ============================================================ */\nconst DAILY_MIN = 15;\n\nconst BRANDS = [\n  {\n    id: 'hh', name: 'Holloway & Hare', short: 'H&H',\n    color: '#185FA5', lightBg: '#E6F1FB',\n    url: 'https://hollowayandhare.com',\n    daily: true,\n    notionQuery: 'Holloway Hare editorial blog',\n    cards: [\n      { id: 'hh-ascot', type: 'Opportunity', title: 'Royal Ascot morning dress guide',\n        body: \"Ascot is H&H's biggest seasonal moment. It's the #1 SEO opportunity right now \u2014 and it'll keep working long after Ascot ends. Window is open.\" },\n      { id: 'hh-cheltenham', type: 'Nudge', title: 'Cheltenham wrap-up \u2014 still has legs',\n        body: \"You covered Cheltenham but the reflective piece never ran. A 'what to wear, what worked' post still finds an audience before Goodwood.\" },\n      { id: 'hh-goodwood', type: 'Opportunity', title: 'Goodwood preview \u2014 start seeding now',\n        body: \"Goodwood press list opens soon. A preview piece positions H&H early. Start it now, publish when ready.\" }\n    ]\n  },\n  {\n    id: 'ch', name: 'CareHelm', short: 'CH',\n    color: '#1D9E75', lightBg: '#E1F5EE',\n    url: 'https://carehelm.co',\n    daily: false,\n    notionQuery: 'CareHelm family care coordination',\n    cards: [\n      { id: 'ch-email', type: 'Nudge', title: 'Personal email to a recent signup',\n        body: \"Not a campaign \u2014 one genuine message. 'How's it going? What made you try it?' The signal you get back is worth more than a month of analytics. Ten minutes max.\" },\n      { id: 'ch-burnout', type: 'Opportunity', title: 'Caregiver burnout content',\n        body: \"Real search volume, thin competition. One well-written piece on caregiver decision fatigue positions CareHelm in a genuinely useful way and ranks for years.\" },\n      { id: 'ch-gm-cross', type: 'Cross-pollination', title: \"Your GM thinking \u2192 CareHelm's best post\",\n        body: \"The ratio/intellectus framework from Gadfly maps directly onto caregiver burnout. The bridge is already built in your head.\" }\n    ]\n  },\n  {\n    id: 'gm', name: 'Gadfly Machines', short: 'GM',\n    color: '#534AB7', lightBg: '#EEEDFE',\n    url: 'https://gadflymachines.com',\n    daily: true,\n    notionQuery: 'Gadfly Machines dialectical community',\n    cards: [\n      { id: 'gm-phronesis', type: 'Opportunity', title: 'Phronesis piece \u2014 strike while warm',\n        body: \"The Discord thread is active. A short published piece right now crystallises the conversation into something the community can point to.\" },\n      { id: 'gm-welcome', type: 'Nudge', title: 'Personal welcome to new member',\n        body: \"The community is small enough that a message from you is the whole experience. One genuine note sets the tone.\" },\n      { id: 'gm-ratio', type: 'Opportunity', title: 'Ratio vs. intellectus \u2014 write it out',\n        body: \"This distinction is the philosophical core of Gadfly. Draft it now \u2014 even rough \u2014 and you'll have the engine behind everything else GM produces.\" }\n    ]\n  },\n  {\n    id: 'tp', name: 'TailorPress', short: 'TP',\n    color: '#8A5E10', lightBg: '#FAEEDA',\n    url: 'https://tailorpress.co',\n    daily: true,\n    notionQuery: 'TailorPress content platform',\n    cards: [\n      { id: 'tp-motion', type: 'Nudge', title: 'Ship something small \u2014 anything',\n        body: \"TailorPress doesn't need a launch plan. It needs motion. A changelog note, a screenshot, a single sentence update.\" },\n      { id: 'tp-casestudy', type: 'Opportunity', title: \"First case study \u2014 it's already done\",\n        body: \"The H&H Ascot guide is TailorPress's first proof of concept. A short 'here's how we built this' adds 300 words to something you've already written.\" }\n    ]\n  },\n  {\n    id: 'vo', name: 'Voice Over', short: 'VO',\n    color: '#C04B20', lightBg: '#FAECE7',\n    url: 'https://markfieldsdavidson.com',\n    daily: true,\n    notionQuery: 'voiceover voice acting demo reel',\n    cards: [\n      { id: 'vo-outreach', type: 'Opportunity', title: 'Casting window outreach \u2014 3 emails',\n        body: \"Casting directors review in cycles. Three specific, targeted emails during an open window are worth ten times thirty generic ones sent cold.\" },\n      { id: 'vo-reel', type: 'Nudge', title: 'Demo reel update \u2014 overdue',\n        body: \"Every pitch you send points to your reel. One focused hour of editing now multiplies the return on every outreach you send this season.\" },\n      { id: 'vo-ch-cross', type: 'Cross-pollination', title: 'VO craft \u2192 CareHelm brand voice',\n        body: \"Your warmth, pacing, and presence on mic are directly transferable to CareHelm's audio and video content. These two worlds haven't met yet.\" }\n    ]\n  },\n  {\n    id: 'di', name: 'Disputatio', short: 'DI',\n    color: '#A0304A', lightBg: '#FAEBEE',\n    url: 'https://disputatio.app',\n    daily: false,\n    notionQuery: 'Disputatio debate argumentation',\n    cards: [\n      { id: 'di-define', type: 'Opportunity', title: 'Define what Disputatio is \u2014 in one sentence',\n        body: \"Before anything else can be built or written for this brand, the one-sentence definition needs to exist. What is it, who is it for, what does it do?\" },\n      { id: 'di-gm-cross', type: 'Cross-pollination', title: 'Disputatio and Gadfly \u2014 siblings or rivals?',\n        body: \"Both live in dialectical territory. Clarifying the relationship unlocks both brands.\" }\n    ]\n  },\n  {\n    id: 'fd', name: 'Family Desk', short: 'FD',\n    color: '#2E7D94', lightBg: '#E3F4F8',\n    daily: false,\n    notionQuery: 'Family Desk household management',\n    cards: [\n      { id: 'fd-define', type: 'Opportunity', title: 'What problem does Family Desk solve?',\n        body: \"Is this a product, a content brand, or a community? Getting this down in a paragraph shapes everything that follows.\" },\n      { id: 'fd-ch-cross', type: 'Cross-pollination', title: 'Family Desk vs. CareHelm \u2014 draw the line',\n        body: \"Both touch family coordination. Understanding where one ends and the other begins prevents confusion for users and focus drift for you.\" }\n    ]\n  },\n  {\n    id: 'sc', name: 'Schola', short: 'SC',\n    color: '#3D6B3A', lightBg: '#E5F2E4',\n    daily: false,\n    notionQuery: 'Schola education learning curriculum',\n    cards: [\n      { id: 'sc-define', type: 'Opportunity', title: 'What is Schola teaching, and to whom?',\n        body: \"The name signals classical learning. Pinning down the subject, the audience, and the format is the first real decision.\" },\n      { id: 'sc-gm-cross', type: 'Cross-pollination', title: 'Gadfly pedagogy \u2192 Schola curriculum',\n        body: \"Socratic method, ratio and intellectus, deliberative practice \u2014 these are already the intellectual core of Gadfly. Schola might be where that thinking becomes structured learning.\" }\n    ]\n  },\n  {\n    id: 'mm', name: 'Masked Mixer', short: 'MM',\n    color: '#1A1A2E', lightBg: '#EEEEF5',\n    url: 'https://maskedmixer.com',\n    dormant: true,\n    daily: false,\n    notionQuery: 'Masked Mixer',\n    cards: [\n      { id: 'mm-form', type: 'Nudge', title: 'Fix newsletter signup form',\n        body: 'Form currently errors on submit. Investigate Supabase connection or switch to a simpler provider.' }\n    ]\n  },\n  {\n    id: 'aa', name: 'AA Operations', short: 'AA',\n    color: '#555', lightBg: '#F0EDE6',\n    ops: true,\n    daily: false,\n    notionQuery: 'AA LLC operations admin',\n    cards: [\n      { id: 'aa-tax', type: 'Admin', title: 'Tax filing',\n        body: \"Federal, state, or quarterly \u2014 log time here for any tax prep, form filing, or accountant calls. Keep a record even if it feels invisible.\" },\n      { id: 'aa-books', type: 'Admin', title: 'Bookkeeping & reconciliation',\n        body: \"Categorising transactions, reconciling accounts, reviewing P&L. The kind of work that compounds silently when skipped.\" },\n      { id: 'aa-legal', type: 'Admin', title: 'Legal & compliance',\n        body: \"LLC renewals, contracts, registered agent, operating agreements. Flag it here so it doesn't slip through the cracks.\" },\n      { id: 'aa-admin', type: 'Admin', title: 'General admin',\n        body: \"Anything AA-level that doesn't fit elsewhere \u2014 insurance, banking, subscriptions, vendor calls. Log it so the invisible work gets counted.\" }\n    ]\n  }\n];\n\nconst BRAND_LABELS = {hh:'H&H',ch:'CareHelm',gm:'Gadfly',tp:'TailorPress',vo:'Voice Over',di:'Disputatio',fd:'Family Desk',sc:'Schola',aa:'AA Ops',mm:'Masked Mixer'};\nconst BRAND_SUBS = {\n  hh:'British editorial \u2014 social season & countryside',\n  ch:'HIPAA-compliant family care coordination',\n  gm:'Dialectical workshop for solo builders',\n  tp:'Content platform \u2014 in build phase',\n  vo:'Voiceover \u2014 outreach, performance, reel',\n  di:'Debate & argumentation \u2014 early stage',\n  fd:'Family management & household coordination',\n  sc:'Classical learning & curriculum \u2014 early stage',\n  aa:'LLC admin, tax, legal, bookkeeping',\n  mm:'Music community \u2014 live at maskedmixer.com, auditioning for a slot'\n};\n\nconst STAGES = [\n  { id: 'ideation',  label: 'Ideation',  color: '#999',    bg: '#F0EDE6' },\n  { id: 'mvp',       label: 'MVP',        color: '#2E7D94', bg: '#E3F4F8' },\n  { id: 'build',     label: 'Build',      color: '#8A5E10', bg: '#FAEEDA' },\n  { id: 'operating', label: 'Operating',  color: '#534AB7', bg: '#EEEDFE' },\n  { id: 'market',    label: '$ Ready',    color: '#1D9E75', bg: '#E1F5EE' },\n];\nconst DEFAULT_STAGES = {\n  hh: 'operating', ch: 'build', gm: 'operating', tp: 'market',\n  vo: 'market', di: 'operating', fd: 'ideation', sc: 'ideation', mm: 'ideation'\n};\n\nconst DEFAULT_BACKEND = {\n  mm: {\n    hosting: 'maskedmixer.com (built with Bolt, hosted via Vercel)',\n    tools: [\n      { name: 'Newsletter', detail: 'Bolt Database via Supabase (stores subscribers)' },\n      { name: 'Contact form', detail: 'Formspree' }\n    ],\n    notes: 'Site is live but business is on hold. Form is currently broken.'\n  }\n};\n\nconst typeStyles = {\n  'Opportunity':       (b) => ({ bg: b.lightBg, color: b.color, dot: b.color }),\n  'Nudge':             ()  => ({ bg: '#F0EDE6', color: '#4A4036', dot: '#8A7A6A' }),\n  'Cross-pollination': ()  => ({ bg: '#EEEDFE', color: '#3D3598', dot: '#534AB7' }),\n  'Admin':             ()  => ({ bg: '#EFEFEF', color: '#555', dot: '#999' }),\n};\n\n/* ============================================================\n   STATE\n   ============================================================ */\nlet activeBrandId = null;\nlet timerInterval = null;\nlet timerStart = null;\nlet runningCardId = null;\nlet runningBrandId = null;\nlet sessionLog = [];\nwindow._notionDays = {};\nwindow._todayCelebrated = {};\n\n/* ============================================================\n   DATE HELPERS\n   ============================================================ */\nfunction todayKey() {\n  const d = new Date();\n  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');\n}\nfunction isWeekday() {\n  const d = new Date().getDay();\n  return d >= 1 && d <= 5;\n}\n\n/* ============================================================\n   LOCALSTORAGE HELPERS\n   ============================================================ */\nfunction ls(key, val) {\n  try {\n    if (val === undefined) return localStorage.getItem(key);\n    localStorage.setItem(key, val);\n  } catch(e) { return null; }\n}\n\nfunction getLastWorked(cardId)  { return ls('bw_card_'  + cardId); }\nfunction setLastWorked(cardId)  { ls('bw_card_' + cardId, new Date().toISOString()); }\nfunction getBrandLast(brandId)  { return ls('bw_brand_' + brandId); }\nfunction setBrandLast(brandId)  { ls('bw_brand_' + brandId, new Date().toISOString()); }\n\nfunction getTodayMins(brandId) {\n  return parseFloat(ls('bw_mins_' + brandId + '_' + todayKey()) || '0');\n}\nfunction addTodayMins(brandId, mins) {\n  const cur = getTodayMins(brandId);\n  ls('bw_mins_' + brandId + '_' + todayKey(), String(cur + mins));\n}\n\n/* ============================================================\n   STAGE HELPERS\n   ============================================================ */\nfunction getStage(brandId) {\n  return ls('bb_stage_' + brandId) || DEFAULT_STAGES[brandId] || 'ideation';\n}\nfunction setStage(brandId, stageId) {\n  ls('bb_stage_' + brandId, stageId);\n}\nfunction getStageMeta(brandId) {\n  const id = getStage(brandId);\n  return STAGES.find(s => s.id === id) || STAGES[0];\n}\nfunction cycleStage(brandId) {\n  const ids = STAGES.map(s => s.id);\n  const cur = getStage(brandId);\n  const next = ids[(ids.indexOf(cur) + 1) % ids.length];\n  setStage(brandId, next);\n  renderBrands();\n  renderOps();\n  if (dormantOpen) renderDormantBrands();\n  renderFunnel();\n}\n\n/* ============================================================\n   LABEL HELPERS\n   ============================================================ */\nfunction lastWorkedLabel(isoStr) {\n  if (!isoStr) return null;\n  const diff = Math.floor((Date.now() - new Date(isoStr)) / 60000);\n  if (diff < 2)  return 'Just now';\n  if (diff < 60) return diff + ' min ago';\n  const hrs = Math.floor(diff / 60);\n  if (hrs < 24)  return hrs + 'h ago';\n  const days = Math.floor(hrs / 24);\n  return days + ' day' + (days === 1 ? '' : 's') + ' ago';\n}\n\nfunction ageInDays(isoStr) {\n  if (!isoStr) return null;\n  return Math.floor((Date.now() - new Date(isoStr)) / 86400000);\n}\n\n/* ============================================================\n   STREAK\n   ============================================================ */\nfunction getDailyStreak(brandId) {\n  let streak = 0;\n  const today = new Date();\n  for (let i = 1; i <= 60; i++) {\n    const d = new Date(today);\n    d.setDate(d.getDate() - i);\n    const day = d.getDay();\n    if (day === 0 || day === 6) continue; // skip weekends\n    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');\n    const mins = parseFloat(localStorage.getItem('bw_mins_' + brandId + '_' + key) || '0');\n    if (mins >= DAILY_MIN) streak++;\n    else break;\n  }\n  return streak;\n}\n\n/* ============================================================\n   SOUND\n   ============================================================ */\nfunction playTone(frequency, duration, volume) {\n  try {\n    const ctx = new (window.AudioContext || window.webkitAudioContext)();\n    const osc = ctx.createOscillator();\n    const gain = ctx.createGain();\n    osc.connect(gain);\n    gain.connect(ctx.destination);\n    osc.frequency.value = frequency;\n    osc.type = 'sine';\n    gain.gain.setValueAtTime(volume || 0.25, ctx.currentTime);\n    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);\n    osc.start(ctx.currentTime);\n    osc.stop(ctx.currentTime + duration);\n  } catch(e) {}\n}\nfunction playStartTone()   { playTone(392, 0.08, 0.18); }\nfunction playStopTone()    { playTone(523, 0.12, 0.2); setTimeout(() => playTone(440, 0.15, 0.15), 100); }\nfunction playSuccessTone() { playTone(523, 0.1, 0.22); setTimeout(() => playTone(784, 0.18, 0.22), 110); }\nfunction playAllDoneFanfare() {\n  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.18, 0.2), i * 90));\n}\n\n/* ============================================================\n   CONFETTI\n   ============================================================ */\nfunction triggerConfetti(x, y, color, count) {\n  const n = count || 35;\n  const palette = [color || '#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#C3B1E1', '#FFD93D'];\n  for (let i = 0; i < n; i++) {\n    const el = document.createElement('div');\n    el.className = 'confetti-piece';\n    const angle = Math.random() * Math.PI * 2;\n    const speed = 70 + Math.random() * 160;\n    const dx = Math.cos(angle) * speed;\n    const dy = Math.sin(angle) * speed - 80;\n    const rot = ((Math.random() - 0.5) * 900) + 'deg';\n    const size = 6 + Math.random() * 9;\n    const c = i < 3 ? color : palette[Math.floor(Math.random() * palette.length)];\n    const dur = 0.65 + Math.random() * 0.55;\n    el.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${c};--dx:${dx}px;--dy:${dy}px;--rot:${rot};animation:confettiBurst ${dur}s ease-out forwards;border-radius:${Math.random() > 0.4 ? '50%' : '2px'};`;\n    document.body.appendChild(el);\n    setTimeout(() => el.remove(), (dur + 0.1) * 1000);\n  }\n}\n\nfunction burstFromEl(el, color, count) {\n  if (!el) return;\n  const r = el.getBoundingClientRect();\n  triggerConfetti(r.left + r.width / 2, r.top + r.height / 2, color, count);\n}\n\n/* ============================================================\n   DAILY PANEL\n   ============================================================ */\nconst ALL_DONE_MESSAGES = [\n  'Four for four. Take a bow.',\n  'All daily brands done. Seriously.',\n  'GM \u2713 VO \u2713 H&H \u2713 TP \u2713 \u2014 Locked in.',\n  'Daily quota: crushed. Go make something.',\n  'Full send. Every brand got 15 min.'\n];\n\nfunction dailyState(brand) {\n  if (!isWeekday()) return 'weekend';\n  const mins = getTodayMins(brand.id);\n  if (mins >= DAILY_MIN) return 'done';\n  if (mins > 0) return 'partial';\n  return 'undone';\n}\n\nfunction renderDailyPanel() {\n  const dailyBrands = BRANDS.filter(b => b.daily);\n  const states = dailyBrands.map(b => dailyState(b));\n\n  let panelClass, titleClass, titleText, subtitleText;\n  if (!isWeekday()) {\n    panelClass = 'weekend'; titleClass = 'weekend';\n    titleText = 'Daily Brands \u2014 Weekend';\n    subtitleText = 'Rest up. Back at it Monday.';\n  } else if (states.every(s => s === 'done')) {\n    panelClass = 'all-done'; titleClass = 'all-done';\n    titleText = '\u2726 Daily brands \u2014 all done';\n    const msg = ALL_DONE_MESSAGES[new Date().getDate() % ALL_DONE_MESSAGES.length];\n    subtitleText = msg;\n  } else if (states.some(s => s === 'done' || s === 'partial')) {\n    panelClass = 'in-progress'; titleClass = 'in-progress';\n    const remaining = dailyBrands.filter((b,i) => states[i] !== 'done');\n    titleText = 'Daily brands \u2014 in progress';\n    subtitleText = remaining.map(b => BRAND_LABELS[b.id]).join(', ') + ' still need attention today';\n  } else {\n    panelClass = 'needs-attention'; titleClass = 'needs-attention';\n    titleText = 'Daily brands \u2014 not started yet';\n    subtitleText = 'GM, VO, H&H, and TP each need 15 min today';\n  }\n\n  const panel = document.getElementById('daily-panel');\n  panel.className = 'daily-panel ' + panelClass;\n  const titleEl = document.getElementById('daily-title');\n  titleEl.className = 'daily-title ' + titleClass;\n  titleEl.textContent = titleText;\n  document.getElementById('daily-subtitle').textContent = subtitleText;\n\n  const row = document.getElementById('daily-cards-row');\n  row.innerHTML = dailyBrands.map((b, i) => {\n    const state = states[i];\n    const mins = getTodayMins(b.id);\n    const pct = Math.min(100, Math.round((mins / DAILY_MIN) * 100));\n    let icon, label;\n    if (state === 'done')         { icon = '\u2713'; label = mins.toFixed(0) + ' min today'; }\n    else if (state === 'partial') { icon = '\u2026'; label = mins.toFixed(0) + ' / 15 min'; }\n    else if (state === 'undone')  { icon = '\u25cb'; label = '0 / 15 min'; }\n    else                          { icon = '\u2014'; label = 'Weekend'; }\n    return `\n      <div class=\"daily-card ${state}\" onclick=\"selectBrand('${b.id}')\" title=\"Click to open ${b.name}\">\n        <div class=\"daily-card-top\">\n          <div class=\"daily-brand-name\" style=\"color:${b.color}\">${BRAND_LABELS[b.id]}</div>\n          <div class=\"daily-status-icon\">${icon}</div>\n        </div>\n        <div class=\"daily-progress-track\">\n          <div class=\"daily-progress-fill\" style=\"width:${pct}%\"></div>\n        </div>\n        <div class=\"daily-mins-label\">${label}</div>\n      </div>`;\n  }).join('');\n}\n\n/* ============================================================\n   HEALTH STRIP\n   ============================================================ */\nfunction healthMeta(brandId) {\n  const iso = getBrandLast(brandId);\n  const notionDays = window._notionDays?.[brandId] ?? null;\n  if (!iso && notionDays === null) return { colorClass: 'age-cold', label: 'Not yet' };\n\n  let days, label;\n  if (iso) {\n    days = ageInDays(iso);\n    label = lastWorkedLabel(iso) || 'Today';\n  } else {\n    days = notionDays;\n    label = days === 0 ? 'Today' : days === 1 ? 'Yesterday' : days + 'd ago';\n  }\n\n  let colorClass;\n  if      (days <= 3)  colorClass = 'age-fresh';\n  else if (days <= 7)  colorClass = 'age-ok';\n  else if (days <= 14) colorClass = 'age-stale';\n  else                 colorClass = 'age-cold';\n\n  return { colorClass, label };\n}\n\nfunction renderHealthStrip() {\n  const container = document.getElementById('health-rows');\n  const days = [];\n  for (let i = 6; i >= 0; i--) {\n    const d = new Date();\n    d.setDate(d.getDate() - i);\n    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');\n    const dayName = d.toLocaleDateString('en-US', { weekday: 'short' }).slice(0,1);\n    days.push({ key, dayName, isToday: i === 0 });\n  }\n\n  const dayLabelRow = `<div class=\"health-day-label-row\">\n    ${days.map(d => `<div class=\"health-day-label\" style=\"${d.isToday ? 'color:#444;font-weight:800' : ''}\">${d.dayName}</div>`).join('')}\n  </div>`;\n\n  const rows = BRANDS.map(b => {\n    const { colorClass, label } = healthMeta(b.id);\n    const dailyPip = b.daily\n      ? `<div class=\"health-daily-pip\" style=\"background:${b.color}\" title=\"Daily brand\"></div>`\n      : `<div class=\"health-daily-pip\" style=\"background:transparent\"></div>`;\n\n    const dots = days.map(d => {\n      const mins = parseFloat(localStorage.getItem('bw_mins_' + b.id + '_' + d.key) || '0');\n      const worked = mins >= 0.5;\n      let fill, opacity;\n      if (!worked)    { fill = '#E8E5DF'; opacity = '1'; }\n      else if (mins < 15) { fill = b.color; opacity = '0.35'; }\n      else            { fill = b.color; opacity = '1'; }\n      const tip = worked ? d.key + ': ' + Math.round(mins) + ' min' : d.key + ': not worked';\n      return `<div class=\"health-day-dot\" style=\"background:${fill};opacity:${opacity}\" title=\"${tip}\"></div>`;\n    }).join('');\n\n    return `\n      <div class=\"health-row\">\n        <div class=\"health-brand-label\">${BRAND_LABELS[b.id]}</div>\n        ${dailyPip}\n        <div class=\"health-dots\">${dots}</div>\n        <div class=\"health-age-label ${colorClass}\">${label}</div>\n      </div>`;\n  }).join('');\n\n  container.innerHTML = dayLabelRow + rows;\n}\n\n/* ============================================================\n   DORMANT BRANDS\n   ============================================================ */\nlet dormantOpen = false;\nlet opsOpen = false;\n\nfunction toggleOps() {\n  opsOpen = !opsOpen;\n  document.getElementById('ops-row').classList.toggle('open', opsOpen);\n  document.getElementById('ops-toggle-btn').textContent = opsOpen ? '\u2699 Hide back office' : '\u2699 Back office';\n  if (opsOpen) renderOps();\n}\n\nfunction openBrandUrl(brandId) {\n  const brand = BRANDS.find(b => b.id === brandId);\n  if (brand && brand.url) window.open(brand.url, '_blank');\n}\n\nfunction toggleDormant() {\n  dormantOpen = !dormantOpen;\n  document.getElementById('dormant-brands-row').classList.toggle('open', dormantOpen);\n  document.getElementById('dormant-toggle-btn').textContent = dormantOpen ? '\ud83e\udd41 Hide auditions' : '\ud83e\udd41 Auditions';\n  if (dormantOpen) renderDormantBrands();\n}\n\nfunction renderDormantBrands() {\n  const row = document.getElementById('dormant-brands-row');\n  const dormantBrands = BRANDS.filter(b => b.dormant);\n  let html = '';\n  dormantBrands.forEach(b => {\n    const isActive = activeBrandId === b.id;\n    const style = isActive ? `background:${b.color}; border-color:${b.color};` : 'background:#F5F4F0; border-color:#ddd;';\n    const stage = getStageMeta(b.id);\n    html += `\n      <button class=\"brand-btn${isActive ? ' active' : ''}\" style=\"${style}; opacity:0.75;\" onclick=\"selectBrand('${b.id}')\" ondblclick=\"openBrandUrl('${b.id}')\" title=\"${b.url ? 'Double-click to open ' + b.url : ''}\">\n        <div class=\"brand-initials\" style=\"color:${isActive ? '#fff' : b.color}\">${b.short}</div>\n        <div class=\"brand-short-name\" style=\"color:${isActive ? '#fff' : '#888'}\">${BRAND_LABELS[b.id]}</div>\n        <div class=\"brand-last\" style=\"color:${isActive ? 'rgba(255,255,255,0.7)' : '#aaa'}\">Auditioning</div>\n        <div class=\"brand-stage-pip\" style=\"background:${stage.bg};color:${stage.color}\" onclick=\"event.stopPropagation();cycleStage('${b.id}')\" ondblclick=\"event.stopPropagation()\" title=\"Click to advance stage\">${stage.label}</div>\n      </button>`;\n  });\n  row.innerHTML = html;\n}\n\n/* ============================================================\n   BRAND FUNNEL\n   ============================================================ */\nlet funnelOpen = false;\n\nfunction toggleFunnel() {\n  funnelOpen = !funnelOpen;\n  document.getElementById('funnel-panel').classList.toggle('open', funnelOpen);\n  document.getElementById('funnel-toggle-btn').textContent = funnelOpen ? '\ud83d\udcca Hide funnel' : '\ud83d\udcca Brand Funnel';\n  if (funnelOpen) renderFunnel();\n}\n\nfunction renderFunnel() {\n  const panel = document.getElementById('funnel-panel');\n  if (!panel) return;\n  const allBrands = BRANDS.filter(b => !b.ops);\n  const cols = STAGES.map(stage => {\n    const brands = allBrands.filter(b => getStage(b.id) === stage.id);\n    const chips = brands.length\n      ? brands.map(b => `<div class=\"funnel-chip\" style=\"background:${stage.bg};color:${stage.color}\" onclick=\"selectBrand('${b.id}')\" title=\"Click to open ${b.name}\">${BRAND_LABELS[b.id]}</div>`).join('')\n      : `<div class=\"funnel-empty\">\u2014</div>`;\n    return `\n      <";
